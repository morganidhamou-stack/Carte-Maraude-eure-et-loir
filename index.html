<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carte Eure-et-Loir</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body, html { margin:0; padding:0; height:100%; }
  #map { height:100%; width:100%; }

  .legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: white;
    padding: 10px 15px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 0 8px rgba(0,0,0,0.25);
    z-index: 1000;
  }

  .legend div {
    display: flex;
    align-items: center;
    cursor: pointer;
    margin-bottom: 6px;
  }

  .circle {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }

  .blue { background: #2A7FFF; }
  .red { background: #D32F2F; }
  .green { background: #2EAF4A; }
</style>
</head>
<body>
<div id="map"></div>

<div class="legend">
  <div id="showMaraude"><span class="circle blue"></span>Maraude</div>
  <div id="showAccueil"><span class="circle red"></span>Accueil de jour</div>
  <div id="showCollecte"><span class="circle green"></span>Point de collecte</div>
  <div id="showAll">
    <span class="circle blue"></span>
    <span class="circle red"></span>
    <span class="circle green"></span>
    Tous
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const map = L.map('map').setView([48.447,1.489],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(map);

const redIcon = new L.Icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41],
  popupAnchor:[1,-34],
  shadowSize:[41,41]
});

const greenIcon = new L.Icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
  shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41],
  popupAnchor:[1,-34],
  shadowSize:[41,41]
});

const maraudeLayer = L.layerGroup().addTo(map);
const accueilLayer = L.layerGroup().addTo(map);
const collecteLayer = L.layerGroup().addTo(map);

const points=[
  {
    title:"Théâtre de Chartres",
    lat:48.442209,
    lng:1.48552,
    info:[
      "Lundi - 19h45 - FAC",
      "Mardi - 19h45 - FAC et Protection civile",
      "Mercredi - 20h00 - Restos du cœur et la PASS",
      "Jeudi - 19h45 - FAC",
      "Vendredi - 19h30 - CRF",
      "Samedi - 19h30 - CRF",
      "Dimanche - 18h00 - Restaurant du cœur"
    ]
  },
  {
    title:"Place Drouaise",
    lat:48.452782,
    lng:1.487984,
    info:[
      "Lundi - 20h15 - FAC",
      "Mardi - 20h15 - FAC et Protection civile",
      "Mercredi - 21h00 - Restos du cœur et la PASS",
      "Jeudi - 20h15 - FAC",
      "Vendredi - 20h30 - CRF",
      "Samedi - 20h30 - CRF",
      "Dimanche - 19h00 - Restaurant du Cœur"
    ]
  }
];

points.forEach(p=>{
  const popup = `<b>${p.title}</b><br>` + p.info.join("<br>");
  L.marker([p.lat,p.lng]).bindPopup(popup).addTo(maraudeLayer);
});

const refugeInfo=`<b>Le Point refuge</b><br>Lundi : 8h15-12h / 13h30-16h30<br>Mardi : 8h15-12h / 13h30-16h30<br>Mercredi : 8h15-12h<br>Jeudi : 8h15-12h / 13h30-16h30<br>Vendredi : 8h15-12h / 13h30-16h30<br>Samedi : 8h15-12h / 13h30-16h30<br>Dimanche : 8h15-12h / 13h30-16h30`;
L.marker([48.447393,1.495139], {icon:redIcon}).bindPopup(refugeInfo).addTo(accueilLayer);

const svpInfo=`<b>Saint Vincent de Paul</b><br>Mercredi : 14h - 17h`;
L.marker([48.43731818272861,1.4831399500939169], {icon:redIcon}).bindPopup(svpInfo).addTo(accueilLayer);

const fatimaInfo=`<b>Notre Dame de fatima - femmes/enfants</b><br>Lundi au samedi : 9h - 17h<br>Téléphone : 06.29.55.19.72`;
L.marker([48.446414,1.481194], {icon:redIcon}).bindPopup(fatimaInfo).addTo(accueilLayer);

const secoursCatholiqueInfo=`<b>Secours Catholique</b><br>Mercredi : 9h - 12h<br>Jeudi : 9h - 12h<br>Vendredi : 9h - 12h`;
L.marker([48.451698,1.489667], {icon:redIcon}).bindPopup(secoursCatholiqueInfo).addTo(accueilLayer);

const facInfo=`<b>Foyer d'Accueil Chartrain</b><br>Resto solidaire :<br>Lundi : 12h - 13h<br>Mardi : 12h - 13h<br>Jeudi : 12h - 13h<br><br>Douche :<br>Lundi au vendredi : 9h - 11h30 / 14h - 16h30`;
L.marker([48.453503,1.49679], {icon:redIcon}).bindPopup(facInfo).addTo(accueilLayer);

const caarudInfo=`<b>CAARUD</b><br>Mardi : 9h30 - 12h<br>Jeudi : 10h - 12h / 14h - 17h30`;
L.marker([48.448769,1.467535], {icon:redIcon}).bindPopup(caarudInfo).addTo(accueilLayer);

// Points verts - collecte
const restosChartresInfo=`<b>Les restos du coeurs - Chartres</b><br>Mardi : 09h - 11h / 14h - 16h<br>Vendredi : 09h - 11h / 14h - 16h`;
L.marker([48.437031,1.506759], {icon:greenIcon}).bindPopup(restosChartresInfo).addTo(collecteLayer);

const restosLuceInfo=`<b>Les restos du coeurs - Lucé</b><br>Mercredi : 13h15 - 17h<br>Vendredi : 09h - 12h`;
L.marker([48.439632,1.462659], {icon:greenIcon}).bindPopup(restosLuceInfo).addTo(collecteLayer);

const restosMainvilliersInfo=`<b>Les restos du coeurs - Mainvilliers</b><br>Mardi : 13h30 - 16h<br>Vendredi : 13h30 - 16h`;
L.marker([48.445972,1.456186], {icon:greenIcon}).bindPopup(restosMainvilliersInfo).addTo(collecteLayer);

const croixRougeInfo=`<b>La Croix rouge Française</b><br>Mardi : 09h - 11h30 / 14h - 16h30<br>Vendredi : 09h - 11h30 / 14h - 16h30<br>Accueil de jour :<br>Mercredi : 14h - 19h<br>Samedi : 14h - 19h`;
L.marker([48.431656,1.509816], {icon:greenIcon}).bindPopup(croixRougeInfo).addTo(collecteLayer);

const secoursCatholiqueCollecteInfo=`<b>Le Secours Catholique</b><br>Mercredi : 09h - 12h<br>Jeudi : 09h - 12h<br>Vendredi : 09h - 12h`;
L.marker([48.451776,1.489665], {icon:greenIcon}).bindPopup(secoursCatholiqueCollecteInfo).addTo(collecteLayer);

function showMaraude() {
  if(!map.hasLayer(maraudeLayer)) map.addLayer(maraudeLayer);
  if(map.hasLayer(accueilLayer)) map.removeLayer(accueilLayer);
  if(map.hasLayer(collecteLayer)) map.removeLayer(collecteLayer);
}

function showAccueil() {
  if(!map.hasLayer(accueilLayer)) map.addLayer(accueilLayer);
  if(map.hasLayer(maraudeLayer)) map.removeLayer(maraudeLayer);
  if(map.hasLayer(collecteLayer)) map.removeLayer(collecteLayer);
}

function showCollecte() {
  if(!map.hasLayer(collecteLayer)) map.addLayer(collecteLayer);
  if(map.hasLayer(maraudeLayer)) map.removeLayer(maraudeLayer);
  if(map.hasLayer(accueilLayer)) map.removeLayer(accueilLayer);
}

function showAll() {
  if(!map.hasLayer(maraudeLayer)) map.addLayer(maraudeLayer);
  if(!map.hasLayer(accueilLayer)) map.addLayer(accueilLayer);
  if(!map.hasLayer(collecteLayer)) map.addLayer(collecteLayer);
}

const legendDiv = document.querySelector('.legend');
L.DomEvent.disableClickPropagation(legendDiv);

document.getElementById('showMaraude').addEventListener('click', showMaraude);
document.getElementById('showAccueil').addEventListener('click', showAccueil);
document.getElementById('showCollecte').addEventListener('click', showCollecte);
document.getElementById('showAll').addEventListener('click', showAll);

</script>
</body>
</html>
